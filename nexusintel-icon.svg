<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0a0a08" rx="12"/>

  <!-- Outer hexagon -->
  <polygon points="60,8 106,34 106,86 60,112 14,86 14,34" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <!-- Inner hexagon -->
  <polygon points="60,22 92,40 92,80 60,98 28,80 28,40" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="1.5"/>
  <!-- Diamond -->
  <polygon points="60,36 78,60 60,84 42,60" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- N -->
  <text x="60" y="70" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="middle">N</text>

  <!-- Corner dots -->
  <circle cx="60" cy="8" r="4" fill="#c9a84c"/>
  <circle cx="106" cy="34" r="4" fill="#c9a84c"/>
  <circle cx="106" cy="86" r="4" fill="#c9a84c"/>
  <circle cx="60" cy="112" r="4" fill="#c9a84c"/>
  <circle cx="14" cy="86" r="4" fill="#c9a84c"/>
  <circle cx="14" cy="34" r="4" fill="#c9a84c"/>
</svg>
