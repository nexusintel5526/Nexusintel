<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a08;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#0a0a08" rx="4"/>

  <!-- ICON MARK — Hexagon with N -->
  <g transform="translate(20, 12)">
    <!-- Outer hexagon -->
    <polygon points="48,4 88,28 88,76 48,100 8,76 8,28" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <!-- Inner hexagon -->
    <polygon points="48,16 76,32 76,68 48,84 20,68 20,32" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
    <!-- Center diamond -->
    <polygon points="48,30 62,52 48,74 34,52" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- N letterform -->
    <text x="48" y="62" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-1">N</text>
    <!-- Corner dots -->
    <circle cx="48" cy="4" r="3" fill="#c9a84c"/>
    <circle cx="88" cy="28" r="3" fill="#c9a84c"/>
    <circle cx="88" cy="76" r="3" fill="#c9a84c"/>
    <circle cx="48" cy="100" r="3" fill="#c9a84c"/>
    <circle cx="8" cy="76" r="3" fill="#c9a84c"/>
    <circle cx="8" cy="28" r="3" fill="#c9a84c"/>
  </g>

  <!-- Vertical rule -->
  <line x1="128" y1="20" x2="128" y2="100" stroke="rgba(201,168,76,0.25)" stroke-width="1"/>

  <!-- WORDMARK -->
  <g transform="translate(144, 0)">
    <!-- NEXUS -->
    <text x="0" y="58" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" fill="#f5f0e8" letter-spacing="4">NEXUS</text>
    <!-- INTEL -->
    <text x="0" y="95" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" fill="url(#goldGrad)" letter-spacing="4">INTEL</text>
    <!-- Tagline -->
    <text x="2" y="112" font-family="Courier New, monospace" font-size="8" fill="rgba(201,168,76,0.5)" letter-spacing="3">AI INTELLIGENCE PLATFORM</text>
  </g>

  <!-- Top-right accent line -->
  <line x1="370" y1="10" x2="390" y2="10" stroke="#c9a84c" stroke-width="2"/>
  <line x1="380" y1="10" x2="380" y2="30" stroke="#c9a84c" stroke-width="2"/>
</svg>
